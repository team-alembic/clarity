<svg width="100" height="100" viewBox="30 30 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="sun-lower-inner" x1="0" x2="0" y1="0" y2="1">
            <stop stop-color="#54133a" offset="0%" />
            <stop stop-color="#34142d" offset="100%" />
        </linearGradient>
        <linearGradient id="sun-lower-outer" x1="0" x2="0" y1="0" y2="1">
            <stop stop-color="#3f123a" offset="0%" />
            <stop stop-color="#251427" offset="100%" />
        </linearGradient>
    </defs>
    <clipPath id="top-half">
        <rect x="20" y="20" width="60" height="30" />
    </clipPath>
    <clipPath id="bottom-half">
        <rect x="20" y="50" width="60" height="30" />
    </clipPath>
    <g id="sun">
        <circle cx="50" cy="50" r="20" fill="#35171f" clip-path="url(#top-half)" />
        <circle cx="50" cy="50" r="10" fill="#feb92e" clip-path="url(#top-half)" />

        <circle cx="50" cy="50" r="20" fill="url(#sun-lower-outer)" clip-path="url(#bottom-half)" />
        <circle cx="50" cy="50" r="10" fill="url(#sun-lower-inner)" clip-path="url(#bottom-half)" />
    </g>
</svg>
